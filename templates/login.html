{% extends "base.html" %}
{% block title %}Login | ApnaGrocery{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card animate-fade-in">
    
    <div class="auth-logo">
      <h1>ApnaGrocery</h1>
      <p>Retail Intelligence Platform</p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background: var(--bg-input); border: 1px solid var(--border); border-right: none; color: var(--text-muted);">
            <i class="bi bi-person"></i>
          </span>
          <input name="username" type="text" class="form-control" placeholder="Enter your username" required style="border-left: none;">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background: var(--bg-input); border: 1px solid var(--border); border-right: none; color: var(--text-muted);">
            <i class="bi bi-lock"></i>
          </span>
          <input name="password" type="password" class="form-control" placeholder="Enter your password" required style="border-left: none;">
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right"></i>
        Sign In
      </button>
    </form>

    <div class="auth-divider">
      <span>Secure Access</span>
    </div>

    <div class="text-center">
      <p class="text-muted mb-0" style="font-size: 0.85rem;">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-semibold">
          Create one
        </a>
      </p>
    </div>

    <!-- Demo Credentials -->
    <div class="mt-4 p-3 rounded" style="background: var(--bg-elevated); border: 1px dashed var(--border);">
      <p class="text-muted mb-2" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
        <i class="bi bi-info-circle me-1"></i>Demo Credentials
      </p>
      <p class="mb-0 text-secondary" style="font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;">
        admin / admin123
      </p>
    </div>

  </div>
</div>
{% endblock %}
