{% extends "base.html" %}
{% block title %}Create Account | GroceryOS{% endblock %}

{% block content %}
<section class="d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card shadow-sm p-4" style="width:420px;">

    <div class="text-center mb-4">
      <h3 class="fw-bold">Create Your Account</h3>
      <p class="text-muted small">
        Start managing your retail operations with GroceryOS
      </p>
    </div>

    <form method="post">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input name="password_confirm" type="password" class="form-control" required>
      </div>

      <button class="btn btn-success w-100">Create Account</button>

    </form>

    <div class="text-center mt-3 small">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>

  </div>
</section>
{% endblock %}
